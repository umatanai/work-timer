<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NC-Modeler Mobile Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --orange: #ff9800; --bg: #000; --card: #1a1a1a; --text: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 画面上部: 3Dビュー固定 */
        #view-container { position: sticky; top: 0; width: 100%; height: 40vh; background: #050505; z-index: 10; border-bottom: 2px solid #333; }
        
        /* 画面下部: 設定スクロールエリア */
        #settings-container { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        h2 { font-size: 0.9rem; margin: 0 0 12px 0; color: var(--orange); border-bottom: 1px solid #333; padding-bottom: 6px; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 1rem; box-sizing: border-box; }
        
        .origin-selector { display: flex; gap: 10px; }
        .origin-btn { flex: 1; padding: 12px; background: #333; border-radius: 8px; text-align: center; font-size: 0.9rem; border: 1px solid #444; }
        .origin-btn.active { background: var(--orange); color: #000; font-weight: bold; }
        
        .calc-box { background: #000; padding: 10px; border-radius: 6px; border: 1px solid var(--orange); margin-top: 10px; font-family: monospace; font-size: 0.85rem; line-height: 1.4; }
        .add-btn { width: 100%; padding: 15px; background: #444; border: none; border-radius: 8px; color: #fff; font-weight: bold; margin-top: 10px; }
        .feature-item { padding: 8px; border-bottom: 1px solid #333; font-size: 0.8rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="view-container"></div>

<div id="settings-container">
    <div class="card">
        <h2>1. ワーク寸法 (製品仕上がり)</h2>
        <div class="row">
            <div class="col"><label>幅 X</label><input type="number" id="wX" value="100" oninput="draw()"></div>
            <div class="col"><label>長さ Y</label><input type="number" id="wY" value="100" oninput="draw()"></div>
            <div class="col"><label>厚み Z</label><input type="number" id="wZ" value="20" oninput="draw()"></div>
        </div>
    </div>

    <div class="card">
        <h2>2. 材料設定 (ストック)</h2>
        <div class="row">
            <div class="col"><label>X取りしろ(片側)</label><input type="number" id="mX" value="1" oninput="draw()"></div>
            <div class="col"><label>Y取りしろ(片側)</label><input type="number" id="mY" value="1" oninput="draw()"></div>
        </div>
        <div class="row">
            <div class="col"><label>上面取りしろ</label><input type="number" id="mZ" value="1" oninput="draw()"></div>
            <div class="col"><label>材料総厚</label><input type="number" id="totalZ" value="25" oninput="draw()"></div>
        </div>
        <div id="calcResult" class="calc-box">計算後の素材サイズ待ち...</div>
    </div>

    <div class="card">
        <h2>3. 原点位置 (G54)</h2>
        <div class="origin-selector">
            <div class="origin-btn active" id="btn_CC" onclick="setOrigin('CC')">中央</div>
            <div class="origin-btn" id="btn_BR" onclick="setOrigin('BR')">右下</div>
        </div>
    </div>

    <div class="card">
        <h2>4. フィーチャー追加</h2>
        <div class="row">
            <select id="fType" style="flex:1.5;"><option value="hole">穴</option><option value="boss">ボス</option></select>
            <input type="number" id="fX" placeholder="X" style="flex:1;">
            <input type="number" id="fY" placeholder="Y" style="flex:1;">
        </div>
        <div class="row">
            <input type="number" id="fD" placeholder="直径" style="flex:1;">
            <input type="number" id="fZ" placeholder="深さ/高さ" style="flex:1;">
            <div class="col" style="display:flex; align-items:center; gap:5px;">
                <input type="checkbox" id="isThrough" style="width:20px;"> <span style="font-size:0.7rem;">貫通</span>
            </div>
        </div>
        <button class="add-btn" onclick="addFeature()">モデルに追加</button>
        <div id="featureList" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    let scene, camera, renderer, controls, modelGroup;
    let currentOrigin = 'CC';
    let features = [];

    function init() {
        const container = document.getElementById('view-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 2000);
        camera.position.set(120, 120, 150);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(100, 200, 100);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x606060));

        // 原点軸 (RGB)
        const axes = new THREE.AxesHelper(40);
        scene.add(axes);

        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        draw();
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    function setOrigin(o) {
        currentOrigin = o;
        document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + o).classList.add('active');
        draw();
    }

    function addFeature() {
        const type = document.getElementById('fType').value;
        const x = parseFloat(document.getElementById('fX').value) || 0;
        const y = parseFloat(document.getElementById('fY').value) || 0;
        const d = parseFloat(document.getElementById('fD').value) || 10;
        let z = parseFloat(document.getElementById('fZ').value) || 5;
        if(document.getElementById('isThrough').checked) z = 999; // 貫通フラグ

        features.push({type, x, y, d, z});
        updateList();
        draw();
    }

    function updateList() {
        const list = document.getElementById('featureList');
        list.innerHTML = features.map((f, i) => `<div class="feature-item">${f.type=='hole'?'穴':'ボス'}: X${f.x} Y${f.y} D${f.d} Z${f.z>500?'通':f.z}</div>`).join('');
    }

    function draw() {
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);

        const wx = parseFloat(document.getElementById('wX').value);
        const wy = parseFloat(document.getElementById('wY').value);
        const wz = parseFloat(document.getElementById('wZ').value);
        const mx = parseFloat(document.getElementById('mX').value);
        const my = parseFloat(document.getElementById('mY').value);
        const mz = parseFloat(document.getElementById('mZ').value);
        const tz = parseFloat(document.getElementById('totalZ').value);

        // 素材サイズ計算表示
        const realMatX = wx + mx * 2;
        const realMatY = wy + my * 2;
        const bottomZ = tz - wz - mz;
        document.getElementById('calcResult').innerHTML = 
            `素材: ${realMatX.toFixed(1)} x ${realMatY.toFixed(1)} x ${tz.toFixed(1)}<br>` +
            `上面余肉: ${mz.toFixed(1)} / 底面余肉: ${bottomZ.toFixed(1)}`;

        // 原点オフセットロジック
        let ox = (currentOrigin === 'CC') ? 0 : -wx;
        let oy = (currentOrigin === 'CC') ? 0 : -wy;

        // ワーク本体 (半透明で中が見えるように)
        const workGeo = new THREE.BoxGeometry(wx, wz, wy);
        const workMat = new THREE.MeshPhongMaterial({ color: 0x444444, transparent: true, opacity: 0.7 });
        const work = new THREE.Mesh(workGeo, workMat);
        work.position.set(wx/2 + ox, -wz/2, wy/2 + oy);
        modelGroup.add(work);

        // 素材 (線枠のみで表示)
        const stockGeo = new THREE.BoxGeometry(realMatX, tz, realMatY);
        const stockMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, wireframe: true });
        const stock = new THREE.Mesh(stockGeo, stockMat);
        stock.position.set(wx/2 + ox, - (wz+mz) + tz/2, wy/2 + oy);
        modelGroup.add(stock);

        // フィーチャー
        features.forEach(f => {
            const depth = (f.z > 500) ? wz + 10 : f.z;
            const geo = new THREE.CylinderGeometry(f.d/2, f.d/2, depth, 32);
            const mat = new THREE.MeshPhongMaterial({ color: f.type==='hole'?0x000000:0x00ff00 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // 穴の場合はワークから少し浮かせて「穴感」を出す
            const yPos = (f.type==='hole') ? -depth/2 : depth/2;
            mesh.position.set(f.x + ox, yPos, f.y + oy);
            modelGroup.add(mesh);
        });
    }

    window.onload = init;
</script>
</body>
</html>
