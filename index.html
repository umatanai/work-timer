<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NC-Modeler V5 - Origin Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --orange: #ff9800; --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --red: #ff4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #view-container { position: sticky; top: 0; width: 100%; height: 45vh; background: #000; z-index: 10; border-bottom: 2px solid #333; }
        #settings-container { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        h2 { font-size: 0.8rem; margin: 0 0 12px 0; color: var(--orange); border-bottom: 1px solid #444; padding-bottom: 6px; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 1rem; box-sizing: border-box; outline: none; }
        .origin-selector { display: flex; gap: 10px; }
        .origin-btn { flex: 1; padding: 12px; background: #333; border-radius: 8px; text-align: center; font-size: 0.9rem; border: 1px solid #444; cursor: pointer; }
        .origin-btn.active { background: var(--orange); color: #000; font-weight: bold; border-color: var(--orange); }
        .add-btn { width: 100%; padding: 15px; background: var(--orange); border: none; border-radius: 8px; color: #000; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .feat-item { display: flex; justify-content: space-between; align-items: center; background: #252525; padding: 10px 12px; border-radius: 6px; margin-top: 8px; font-size: 0.85rem; border-left: 4px solid var(--orange); }
        .del-btn { background: var(--red); color: white; border: none; border-radius: 4px; padding: 6px 10px; cursor: pointer; }
        .calc-box { background: #001a00; padding: 12px; border-radius: 6px; border: 1px solid #004400; margin-top: 10px; font-family: monospace; font-size: 0.75rem; color: #00ff00; }
    </style>
</head>
<body>

<div id="view-container"></div>

<div id="settings-container">
    <div class="card">
        <h2>1. ワーク完成寸法</h2>
        <div class="row">
            <div class="col"><label>幅 X</label><input type="number" id="wX" value="100" oninput="draw()"></div>
            <div class="col"><label>長さ Y</label><input type="number" id="wY" value="100" oninput="draw()"></div>
            <div class="col"><label>厚み Z</label><input type="number" id="wZ" value="20" oninput="draw()"></div>
        </div>
    </div>

    <div class="card">
        <h2>2. 素材寸法</h2>
        <div class="row">
            <div class="col"><label>素材 X</label><input type="number" id="mX" value="105" oninput="draw()"></div>
            <div class="col"><label>素材 Y</label><input type="number" id="mY" value="105" oninput="draw()"></div>
        </div>
        <div class="row">
            <div class="col"><label>上面しろ</label><input type="number" id="mZ_top" value="1" oninput="draw()"></div>
            <div class="col"><label>素材全厚</label><input type="number" id="mZ_total" value="25" oninput="draw()"></div>
        </div>
        <div id="calcInfo" class="calc-box"></div>
    </div>

    <div class="card">
        <h2>3. 原点位置 (G54)</h2>
        <div class="origin-selector">
            <div class="origin-btn active" id="btn_CC" onclick="setOrigin('CC')">中央</div>
            <div class="origin-btn" id="btn_BR" onclick="setOrigin('BR')">右下</div>
        </div>
    </div>

    <div class="card">
        <h2>4. 形状追加 (Input coordinates from G54)</h2>
        <div class="row">
            <select id="fType" style="flex:1.5;"><option value="hole">穴</option><option value="boss">ボス</option></select>
            <input type="number" id="fX" placeholder="X" style="flex:1;">
            <input type="number" id="fY" placeholder="Y" style="flex:1;">
        </div>
        <div class="row">
            <input type="number" id="fD" placeholder="Φ" style="flex:1;">
            <input type="number" id="fZ" placeholder="深" style="flex:1;">
        </div>
        <button class="add-btn" onclick="addFeature()">追加</button>
        <div id="featureList"></div>
    </div>
</div>

<script>
    let scene, camera, renderer, controls, modelGroup;
    let currentOrigin = 'CC';
    let features = [];

    function init() {
        const container = document.getElementById('view-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 5000);
        camera.position.set(200, 200, 200);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xaaaaaa, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(100, 300, 100);
        scene.add(sun);

        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        draw();
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    function setOrigin(o) {
        currentOrigin = o;
        document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn_' + o).classList.add('active');
        draw();
    }

    function addFeature() {
        const type = document.getElementById('fType').value;
        const x = parseFloat(document.getElementById('fX').value) || 0;
        const y = parseFloat(document.getElementById('fY').value) || 0;
        const d = parseFloat(document.getElementById('fD').value) || 10;
        const z = parseFloat(document.getElementById('fZ').value) || 5;
        features.push({ type, x, y, d, z, id: Date.now() });
        updateFeatureList();
        draw();
    }

    function removeFeature(id) {
        features = features.filter(f => f.id !== id);
        updateFeatureList();
        draw();
    }

    function updateFeatureList() {
        const list = document.getElementById('featureList');
        list.innerHTML = features.map(f => `
            <div class="feat-item">
                <span><b>${f.type === 'hole' ? '穴' : 'ボス'}</b> (X${f.x}, Y${f.y}, Φ${f.d})</span>
                <button class="del-btn" onclick="removeFeature(${f.id})">削除</button>
            </div>
        `).join('');
    }

    function drawOriginMark() {
        const group = new THREE.Group();
        const mat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const size = 60;
        // 十字 (G54 0点)
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-size,0,0), new THREE.Vector3(size,0,0)]), mat));
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-size), new THREE.Vector3(0,0,size)]), mat));
        // リング
        const ring = new THREE.Mesh(new THREE.TorusGeometry(5, 0.4, 8, 32), new THREE.MeshBasicMaterial({color:0xffffff}));
        ring.rotation.x = Math.PI/2;
        group.add(ring);
        modelGroup.add(group);
    }

    function draw() {
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);
        drawOriginMark();

        const wx = parseFloat(document.getElementById('wX').value);
        const wy = parseFloat(document.getElementById('wY').value);
        const wz = parseFloat(document.getElementById('wZ').value);
        const mx = parseFloat(document.getElementById('mX').value);
        const my = parseFloat(document.getElementById('mY').value);
        const mz_top = parseFloat(document.getElementById('mZ_top').value);
        const mz_total = parseFloat(document.getElementById('mZ_total').value);

        document.getElementById('calcInfo').innerHTML = `底面残り: ${(mz_total - wz - mz_top).toFixed(2)} mm`;

        // --- ワーク配置ロジック (ここが修正の核心) ---
        let workPosX, workPosZ;

        if (currentOrigin === 'CC') {
            // 中央：中心が(0,0)
            workPosX = 0;
            workPosZ = 0;
        } else {
            // 右下(BR)：原点(0,0)に対して、ワークは左(X-)、奥(Y+)に広がる
            // Three.jsのZ軸(マイナス)が現場のYプラス(奥)
            workPosX = -wx / 2; // 原点から左に全幅の半分ずらす
            workPosZ = -wy / 2; // 原点から奥に全長の半分ずらす
        }

        // ワーク本体
        const work = new THREE.Mesh(
            new THREE.BoxGeometry(wx, wz, wy),
            new THREE.MeshPhongMaterial({ color: 0x555555, transparent: true, opacity: 0.7 })
        );
        work.position.set(workPosX, -wz/2, workPosZ); 
        modelGroup.add(work);

        // 素材
        const stock = new THREE.Mesh(
            new THREE.BoxGeometry(mx, mz_total, my),
            new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true })
        );
        stock.position.set(workPosX, -(wz + mz_top) + mz_total/2, workPosZ);
        modelGroup.add(stock);

        // --- フィーチャーの配置 (現場座標系をThree.jsへ変換) ---
        features.forEach(f => {
            const geo = new THREE.CylinderGeometry(f.d/2, f.d/2, f.z, 32);
            const isHole = f.type === 'hole';
            const mat = new THREE.MeshPhongMaterial({ color: isHole ? 0xff4444 : 0x44ff44 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // 現場のX = そのままX
            // 現場のYプラス(奥) = Three.jsのZマイナス(奥)
            const yDepth = isHole ? -f.z/2 : f.z/2;
            mesh.position.set(f.x, yDepth, -f.y); 
            
            modelGroup.add(mesh);
        });
    }

    window.onload = init;
</script>
</body>
</html>
