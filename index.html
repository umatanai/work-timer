<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NC-Modeler V8 - Integrated CAM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --orange: #ff9800; --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --red: #ff4444; --blue: #2196f3; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #view-container { width: 100%; height: 35vh; background: #000; border-bottom: 2px solid #333; }
        #settings-container { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #333; }
        h2 { font-size: 0.8rem; margin: 0 0 10px 0; color: var(--orange); border-bottom: 1px solid #444; padding-bottom: 4px; }
        .row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        .col { flex: 1; }
        label { display: block; font-size: 0.6rem; color: #888; margin-bottom: 2px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 0.85rem; }
        .sign-btn { padding: 8px; background: #444; border: 1px solid #555; color: #fff; border-radius: 4px; cursor: pointer; width: 35px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-add { background: var(--orange); color: #000; }
        .btn-proc { background: var(--blue); color: #fff; }
        .feat-item { background: #252525; padding: 8px; border-radius: 6px; margin-top: 5px; border-left: 4px solid var(--orange); font-size: 0.75rem; display: flex; justify-content: space-between; }
        .proc-item { background: #1e2a38; padding: 10px; border-radius: 8px; margin-top: 8px; border-left: 4px solid var(--blue); }
        .gcode-area { background: #001a00; color: #00ff00; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.7rem; white-space: pre-wrap; margin-top: 10px; border: 1px solid #004400; }
    </style>
</head>
<body>

<div id="view-container"></div>

<div id="settings-container">
    
    <div class="card">
        <h2>🛠 工具登録</h2>
        <div class="row">
            <input type="text" id="tName" placeholder="工具名" style="flex:2;">
            <input type="number" id="tD" placeholder="径Φ" style="flex:1;">
            <button class="btn-add" style="padding:10px; width:60px;" onclick="addTool()">登録</button>
        </div>
        <select id="toolSelect" style="margin-top:5px;"></select>
    </div>

    <div class="card">
        <h2>1. ワーク・形状設計</h2>
        <div class="row">
            <div class="col"><label>幅 X</label><input type="number" id="wX" value="100" oninput="draw()"></div>
            <div class="col"><label>長さ Y</label><input type="number" id="wY" value="100" oninput="draw()"></div>
            <div class="col"><label>厚 Z</label><input type="number" id="wZ" value="20" oninput="draw()"></div>
            <div class="col"><label>面取C/R</label><input type="number" id="wCR" value="0" oninput="draw()"></div>
        </div>
        
        <div class="row">
            <select id="fType" onchange="togglePocketFields()" style="flex:1.2;">
                <option value="hole">穴/タップ</option>
                <option value="pocket">中心基準ポケット</option>
            </select>
            <button class="sign-btn" id="sX" onclick="toggleSign('sX')">+</button>
            <input type="number" id="fX" placeholder="X" style="flex:1;">
            <button class="sign-btn" id="sY" onclick="toggleSign('sY')">+</button>
            <input type="number" id="fY" placeholder="Y" style="flex:1;">
        </div>

        <div id="pocketFields" style="display:none;">
            <div class="row">
                <input type="number" id="pW" placeholder="幅(X)">
                <input type="number" id="pL" placeholder="長(Y)">
                <input type="number" id="pR" placeholder="隅R">
            </div>
        </div>

        <div class="row">
            <input type="text" id="fD" placeholder="Φ / M径" style="flex:1;">
            <input type="number" id="fZ" placeholder="深さZ(-)" style="flex:1;">
            <button class="btn-add" style="flex:1; margin:0;" onclick="addFeature()">追加</button>
        </div>
        <div id="featureList"></div>
    </div>

    <div class="card">
        <h2>2. 素材 (Stock)</h2>
        <div class="row">
            <div class="col"><label>上面しろ</label><input type="number" id="mZ_top" value="4" oninput="draw()"></div>
            <div class="col"><label>全厚</label><input type="number" id="mZ_total" value="30" oninput="draw()"></div>
        </div>
    </div>

    <div class="card">
        <h2>3. 工程 & NC出力</h2>
        <div class="row">
            <select id="procType" style="flex:1.5;">
                <option value="face">上面フェイス</option>
                <option value="hole">穴/タップ加工</option>
                <option value="pocket">ポケット加工</option>
            </select>
            <button class="btn-proc" style="flex:1; margin:0;" onclick="addProcess()">工程追加</button>
        </div>
        <div id="processList"></div>
        <div class="row" style="margin-top:10px;">
            <input type="text" id="oNum" value="O1234" style="flex:1;">
            <button class="btn-proc" style="flex:1; background:green;" onclick="generateGCode()">Gコード出力</button>
        </div>
        <div id="gcodeBox" class="gcode-area"></div>
    </div>
</div>

<script>
    let scene, camera, renderer, controls, modelGroup;
    let features = [];
    let processes = [];
    let tools = [{id:1, name:"Face80", d:80}, {id:2, name:"EM10", d:10}];

    function init() {
        const container = document.getElementById('view-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 3000);
        camera.position.set(150, 150, 150);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xaaaaaa, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(100, 300, 100);
        scene.add(sun);
        modelGroup = new THREE.Group();
        scene.add(modelGroup);
        updateToolUI();
        draw();
        animate();
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

    function toggleSign(id) {
        const btn = document.getElementById(id);
        btn.innerText = btn.innerText === '+' ? '-' : '+';
    }

    function togglePocketFields() {
        document.getElementById('pocketFields').style.display = 
            document.getElementById('fType').value === 'pocket' ? 'block' : 'none';
    }

    function addTool() {
        const name = document.getElementById('tName').value;
        const d = parseFloat(document.getElementById('tD').value);
        if(!name || !d) return;
        tools.push({id:Date.now(), name, d});
        updateToolUI();
    }

    function updateToolUI() {
        const select = document.getElementById('toolSelect');
        select.innerHTML = tools.map(t => `<option value="${t.id}">${t.name} (Φ${t.d})</option>`).join('');
    }

    function addFeature() {
        const type = document.getElementById('fType').value;
        const xSign = document.getElementById('sX').innerText === '+' ? 1 : -1;
        const ySign = document.getElementById('sY').innerText === '+' ? 1 : -1;
        
        const f = {
            id: Date.now(),
            type,
            x: (parseFloat(document.getElementById('fX').value) || 0) * xSign,
            y: (parseFloat(document.getElementById('fY').value) || 0) * ySign,
            z: parseFloat(document.getElementById('fZ').value) || -10,
            d: document.getElementById('fD').value,
            pw: parseFloat(document.getElementById('pW').value) || 0,
            pl: parseFloat(document.getElementById('pL').value) || 0,
            pr: parseFloat(document.getElementById('pR').value) || 0
        };
        features.push(f);
        updateFeatureUI();
        draw();
    }

    function updateFeatureUI() {
        document.getElementById('featureList').innerHTML = features.map(f => `
            <div class="feat-item">
                <span>${f.type.toUpperCase()}: X${f.x} Y${f.y} Z${f.z}</span>
                <button class="del-btn" onclick="removeFeature(${f.id})">×</button>
            </div>`).join('');
    }

    function removeFeature(id) { features = features.filter(f => f.id !== id); updateFeatureUI(); draw(); }

    function addProcess() {
        const toolId = parseInt(document.getElementById('toolSelect').value);
        const tool = tools.find(t => t.id === toolId);
        processes.push({
            id: Date.now(),
            type: document.getElementById('procType').value,
            tool,
            ap: tool.d * 0.7, // apは工具径の70%
            ae: tool.d * 0.5,
            s: 2000,
            f: 500
        });
        updateProcessUI();
        draw();
    }

    function updateProcessUI() {
        document.getElementById('processList').innerHTML = processes.map(p => `
            <div class="proc-item">
                <div style="font-size:0.75rem; font-weight:bold; color:var(--blue); margin-bottom:5px;">${p.type.toUpperCase()} - ${p.tool.name}</div>
                <div class="row">
                    <div class="col"><label>ap</label><input type="number" value="${p.ap}" oninput="updateProcParam(${p.id}, 'ap', this.value)"></div>
                    <div class="col"><label>ae</label><input type="number" value="${p.ae}" oninput="updateProcParam(${p.id}, 'ae', this.value)"></div>
                    <div class="col"><label>送り</label><input type="number" value="${p.f}" oninput="updateProcParam(${p.id}, 'f', this.value)"></div>
                </div>
            </div>`).join('');
    }

    function updateProcParam(id, key, val) {
        const p = processes.find(proc => proc.id === id);
        if(p) p[key] = parseFloat(val);
        draw();
    }

    function removeProcess(id) { processes = processes.filter(p => p.id !== id); updateProcessUI(); draw(); }

    function draw() {
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);
        
        // --- 原点マーク (G54) ---
        const markMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        modelGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-60,0,0), new THREE.Vector3(60,0,0)]), markMat));
        modelGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-60), new THREE.Vector3(0,0,60)]), markMat));
        const ring = new THREE.Mesh(new THREE.TorusGeometry(5, 0.3, 8, 32), new THREE.MeshBasicMaterial({color:0xffffff}));
        ring.rotation.x = Math.PI/2;
        modelGroup.add(ring);

        const wx = parseFloat(document.getElementById('wX').value);
        const wy = parseFloat(document.getElementById('wY').value);
        const wz = parseFloat(document.getElementById('wZ').value);
        const mz_top = parseFloat(document.getElementById('mZ_top').value);
        const mz_total = parseFloat(document.getElementById('mZ_total').value);

        // 右下原点ロジック
        let workPosX = -wx / 2;
        let workPosZ = wy / 2;

        // ワーク
        const work = new THREE.Mesh(new THREE.BoxGeometry(wx, wz, wy), new THREE.MeshPhongMaterial({ color: 0x666666, transparent: true, opacity: 0.7 }));
        work.position.set(workPosX, -wz/2, workPosZ);
        modelGroup.add(work);

        // 素材
        const stock = new THREE.Mesh(new THREE.BoxGeometry(wx+5, mz_total, wy+5), new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true }));
        stock.position.set(workPosX, -(wz + mz_top) + mz_total/2, workPosZ);
        modelGroup.add(stock);

        // フィーチャー
        features.forEach(f => {
            let mesh;
            if(f.type === 'hole') {
                const geo = new THREE.CylinderGeometry(5, 5, Math.abs(f.z), 32);
                mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0xff4444 }));
                mesh.position.set(f.x, f.z/2, -f.y);
            } else {
                const geo = new THREE.BoxGeometry(f.pw, Math.abs(f.z), f.pl);
                mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x4444ff, transparent:true, opacity:0.5 }));
                mesh.position.set(f.x, f.z/2, -f.y);
            }
            modelGroup.add(mesh);
        });
    }

    function generateGCode() {
        const o = document.getElementById('oNum').value;
        let g = `${o}\n(NC-MODELER V8 OUTPUT)\nG21 G90 G54\n`;
        processes.forEach((p, i) => {
            g += `(T${i+1}: ${p.tool.name} - ${p.type})\n`;
            g += `M06 T${i+1}\nS${p.s} M03\n`;
            g += `G00 X0 Y0\nG43 Z50. H01\n`;
            g += `... (PATH CALCULATION) ...\n`;
        });
        g += "M30\n%";
        document.getElementById('gcodeBox').innerText = g;
    }

    window.onload = init;
</script>
</body>
</html>
